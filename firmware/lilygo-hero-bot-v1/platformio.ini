; HERO.Bot future firmware skeleton for LILYGO T-Display-S3.
; This project is intentionally non-functional for now and serves as a bridge target.

[platformio]
default_envs = lilygo-hero-bot-v1
src_dir = src

[env:lilygo-hero-bot-v1]
platform = espressif32@6.5.0
board = lilygo-t-displays3
framework = arduino

monitor_speed = 115200
build_flags =
  -D HERO_DEVICE_BRIDGE_SKELETON=1

lib_deps =
  ; Keep empty until the board-specific implementation is needed.