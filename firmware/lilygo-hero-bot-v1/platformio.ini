; HERO.Bot future firmware skeleton for LILYGO T-Display-S3.
; This project is intentionally non-functional for now and serves as a bridge target.

[platformio]
default_envs = lilygo-hero-bot-v1
src_dir = src

[env:lilygo-hero-bot-v1]
platform = espressif32@6.5.0
board = lilygo-t-display-s3
framework = arduino

monitor_speed = 115200
upload_protocol = esptool
upload_speed = 921600
build_flags =
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -include include/hero_tdisplay_s3_config.h

lib_deps =
  bodmer/TFT_eSPI@2.5.43
  bblanchon/ArduinoJson@7.0.4
  links2004/WebSockets@2.4.1
