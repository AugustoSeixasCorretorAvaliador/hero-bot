<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HERO.Bot Extension</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup-container">
    <h1>HERO.Bot Extension</h1>
    <div class="status-row">
      <span>Status WS:</span> <strong id="wsStatus">Connecting...</strong>
    </div>
    <div class="status-row">
      <span>Página:</span> <strong id="pageStatus">WhatsApp Web</strong>
    </div>
    <div class="status-row">
      <span>Último evento:</span> <strong id="lastEvent">Nenhum</strong>
    </div>
    <div class="settings-box">
      <label class="toggle-row" for="showMiniOverlay">
        <input id="showMiniOverlay" type="checkbox" checked />
        <span>Mostrar Mini Overlay</span>
      </label>
      <label class="toggle-row" for="sendToSimulator">
        <input id="sendToSimulator" type="checkbox" checked />
        <span>Enviar também para Simulator</span>
      </label>
      <label class="toggle-row" for="overlayDebugTimeline">
        <input id="overlayDebugTimeline" type="checkbox" />
        <span>Debug: mini timeline no overlay</span>
      </label>
    </div>
    <div class="buttons-row">
      <button id="bootBtn" class="btn" data-event="BOOT">BOOT</button>
      <button id="readyBtn" class="btn" data-event="READY">READY</button>
      <button id="idleBtn" class="btn" data-event="IDLE">IDLE</button>
      <button id="workingBtn" class="btn" data-event="THINKING">THINKING</button>
      <button id="writingBtn" class="btn" data-event="WRITING">WRITING</button>
      <button id="doneBtn" class="btn" data-event="SUCCESS">SUCCESS</button>
      <button id="errorBtn" class="btn error" data-event="ERROR">ERROR</button>
      <button id="hotLeadsBtn" class="btn" data-event="HOT_LEAD">HOT_LEAD</button>
      <button id="sleepBtn" class="btn" data-event="SLEEP">SLEEP</button>
      <button id="offlineBtn" class="btn error" data-event="OFFLINE">OFFLINE</button>
    </div>
    <div class="footer-note">Eventos locais: Mini Overlay + Simulator (opcional via WS).</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
