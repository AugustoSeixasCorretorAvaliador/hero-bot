name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Simulator (npm)
        working-directory: firmware/simulator
        run: |
          if [ -f package.json ]; then
            npm ci
            if grep -q "\"lint\"" package.json; then npm run lint || true; else echo "no lint script"; fi
            if grep -q "\"build\"" package.json; then npm run build || echo "no build script"; else echo "no build script"; fi
          else
            echo "No simulator package.json found"
          fi

      - name: Setup Python and PlatformIO
        run: |
          python3 -m pip install --upgrade pip
          pip install -U platformio

      - name: Build firmware (tabbie)
        working-directory: firmware
        run: |
          pio run -e tabbie || echo "tabbie build failed or env not present"

      - name: Build firmware (hero_bot_test)
        working-directory: firmware
        run: |
          pio run -e hero_bot_test || echo "hero_bot_test build failed or env not present"

      - name: Build firmware (tdisplay_s3)
        working-directory: firmware
        run: |
          pio run -e tdisplay_s3 || pio run -e lilygo-t-display-s3 || echo "tdisplay build failed or env not present"

      - name: Validate HeroCore
        working-directory: firmware
        run: |
          # Try a default build to validate core compilation
          pio run || echo "core validation completed (some envs may be absent)"

      - name: Prepare for unit tests (placeholder)
        run: |
          echo "Unit test integration hooks prepared. Add test runner steps to this workflow when tests are available."

    # Do not upload artifacts or create releases in this workflow.
